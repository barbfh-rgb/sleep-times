<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wake Times Ahh</title>
  <link rel="manifest" href="wake-manifest.json">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wake Times Ahh">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #1a1a1f;
      --surface2: #242430;
      --border: #2e2e3a;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --danger: #f77c6a;
      --success: #6af7a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
    }

    .header-logo {
      height: 42px;
      width: auto;
      filter:
        drop-shadow(0 0 6px rgba(212, 175, 55, 0.9))
        drop-shadow(0 0 14px rgba(212, 175, 55, 0.5))
        drop-shadow(0 0 28px rgba(212, 175, 55, 0.25));
    }

    #live-clock {
      font-size: 0.85rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Tab bar ── */
    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    nav button {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Views ── */
    .view { display: none; flex-direction: column; flex: 1; }
    .view.active { display: flex; }

    /* ── Tonight view ── */
    #tonight-view {
      align-items: center;
      padding: 32px 20px 20px;
      gap: 0;
    }

    #night-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 32px;
    }

    #log-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--accent-glow);
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 0 40px var(--accent-glow);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #log-btn:active {
      transform: scale(0.94);
      background: rgba(124, 106, 247, 0.45);
    }

    #log-btn .icon { font-size: 2rem; line-height: 1; }

    #flash {
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--success);
      min-height: 1.2em;
      transition: opacity 0.4s;
    }

    #flash.hidden { opacity: 0; }

    /* Tonight's entries */
    #tonight-list-wrap {
      width: 100%;
      max-width: 400px;
      margin-top: 32px;
    }

    #tonight-count {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--surface);
      border-radius: 10px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
    }

    .entry-time {
      font-size: 1.25rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .entry-since {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .add-note-link {
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      margin-top: 3px;
      display: inline-block;
      opacity: 0.6;
    }

    .add-note-link:hover { opacity: 1; }

    .entry-note {
      font-size: 0.75rem;
      color: var(--accent);
      font-style: italic;
      margin-top: 3px;
      cursor: pointer;
      display: inline-block;
    }

    .note-input {
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.75rem;
      padding: 4px 8px;
      width: 130px;
      margin-top: 4px;
      outline: none;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
      margin-left: 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--danger); background: rgba(247, 124, 106, 0.1); }

    /* ── Morning feeling ── */
    #morning-section {
      width: 100%;
      max-width: 400px;
      margin-top: 28px;
    }

    #morning-heading {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .feeling-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .feeling-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.85rem;
      padding: 12px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .feeling-btn.selected {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .feeling-btn .feeling-emoji { font-size: 1.2rem; }

    .morning-tag {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 99px;
    }

    /* ── History view ── */
    #history-view {
      padding: 16px 20px;
      overflow-y: auto;
      gap: 16px;
    }

    #history-empty {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      margin-top: 40px;
    }

    .night-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .night-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .night-card-date {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .night-card-count {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .night-card-entries { padding: 8px 14px; }

    .history-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-entry:last-child { border-bottom: none; }

    .history-entry-time {
      font-size: 1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .history-entry-note {
      font-size: 0.72rem;
      color: var(--accent);
      font-style: italic;
      flex: 1;
      padding: 0 8px;
    }

    .history-entry-gap {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex;
      gap: 8px;
      padding: 0 14px 10px;
    }

    .stat-chip {
      flex: 1;
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat-chip .val {
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-chip .lbl {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .clear-night-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s;
    }

    .clear-night-btn:hover { color: var(--danger); }

    /* ── Stats view ── */
    #stats-view {
      padding: 16px 20px;
      overflow-y: auto;
      gap: 16px;
    }

    .stats-section-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .stats-section-title:first-child { margin-top: 0; }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .summary-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
    }

    .summary-chip .big-val {
      font-size: 1.6rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .summary-chip .lbl {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* Bar chart */
    .bar-chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 14px 10px;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 80px;
      margin-bottom: 6px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }

    .bar {
      width: 100%;
      background: var(--accent);
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      opacity: 0.75;
      transition: height 0.3s;
    }

    .bar-val {
      font-size: 0.7rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .bar-day {
      font-size: 0.65rem;
      color: var(--muted);
    }

    /* Feeling stats */
    .feeling-stats-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .feeling-stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .feeling-stat-row:last-child { border-bottom: none; }

    .feeling-bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .feeling-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.4s;
    }

    .feeling-stat-count {
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 24px;
      text-align: right;
    }

    .stats-empty {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 40px;
    }

    /* ── Thoughts section ── */
    #thoughts-section {
      width: 100%;
      max-width: 400px;
      margin-top: 28px;
    }

    #thoughts-heading {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #thoughts-textarea {
      width: 100%;
      min-height: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    #thoughts-textarea:focus {
      border-color: var(--accent);
    }

    #thoughts-textarea::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .history-thoughts {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      padding: 8px 14px 10px;
      border-top: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<script>
  const FEELINGS = [
    { id: 'refreshed', label: 'Refreshed', emoji: '😊' },
    { id: 'ok',        label: 'OK',         emoji: '😐' },
    { id: 'tired',     label: 'Still tired', emoji: '😴' },
    { id: 'exhausted', label: 'Exhausted',  emoji: '😩' },
  ];

  // A "night" runs from 20:00 to 11:59 the next day.
  function nightKey(ts) {
    const d = new Date(ts);
    const h = d.getHours();
    if (h < 12) {
      const prev = new Date(d);
      prev.setDate(prev.getDate() - 1);
      return prev.toISOString().slice(0, 10);
    }
    return d.toISOString().slice(0, 10);
  }

  function todayNightKey() { return nightKey(Date.now()); }

  function nightLabel(key) {
    const d = new Date(key + 'T20:00:00');
    const opts = { weekday: 'short', month: 'short', day: 'numeric' };
    const eve = d.toLocaleDateString(undefined, opts);
    const morn = new Date(d);
    morn.setDate(morn.getDate() + 1);
    return `${eve} → ${morn.toLocaleDateString(undefined, opts)}`;
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  }

  function fmtGap(ms) {
    if (ms < 0) return '';
    const m = Math.round(ms / 60000);
    if (m < 60) return `+${m}m`;
    const h = Math.floor(m / 60), rem = m % 60;
    return `+${h}h ${rem}m`;
  }

  // Data format: { "2026-05-17": { wakes: [{ts, note}], morning: "refreshed"|null } }
  // Migrates old format (plain array of timestamps) automatically.
  function getData() {
    try {
      const raw = JSON.parse(localStorage.getItem('wake-times') || '{}');
      const out = {};
      for (const [key, val] of Object.entries(raw)) {
        if (Array.isArray(val)) {
          out[key] = { wakes: val.map(ts => ({ ts, note: '' })), morning: null, thoughts: '' };
        } else {
          out[key] = { thoughts: '', ...val };
        }
      }
      return out;
    } catch { return {}; }
  }

  function saveData(d) { localStorage.setItem('wake-times', JSON.stringify(d)); }

  function getNight(key) {
    return getData()[key] || { wakes: [], morning: null, thoughts: '' };
  }

  function saveThoughts(key, text) {
    const d = getData();
    if (!d[key]) d[key] = { wakes: [], morning: null, thoughts: '' };
    d[key].thoughts = text;
    saveData(d);
  }

  function logWake() {
    const ts = Date.now();
    const key = nightKey(ts);
    const d = getData();
    if (!d[key]) d[key] = { wakes: [], morning: null };
    d[key].wakes.push({ ts, note: '' });
    saveData(d);
    showFlash('Logged ' + fmtTime(ts));
    renderTonight();
  }

  function saveNote(key, ts, note) {
    const d = getData();
    if (!d[key]) return;
    const w = d[key].wakes.find(w => w.ts === ts);
    if (w) w.note = note;
    saveData(d);
  }

  function deleteEntry(key, ts) {
    const d = getData();
    if (!d[key]) return;
    d[key].wakes = d[key].wakes.filter(w => w.ts !== ts);
    if (d[key].wakes.length === 0 && !d[key].morning) delete d[key];
    saveData(d);
    renderTonight();
    renderHistory();
  }

  function setMorning(key, feelingId) {
    const d = getData();
    if (!d[key]) d[key] = { wakes: [], morning: null };
    d[key].morning = d[key].morning === feelingId ? null : feelingId; // toggle off
    saveData(d);
    renderTonight();
    renderHistory();
  }

  let flashTimer;
  function showFlash(msg) {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.classList.remove('hidden');
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => el.classList.add('hidden'), 2000);
  }

  function renderTonight() {
    const key = todayNightKey();
    const night = getNight(key);
    const entries = night.wakes.slice().sort((a, b) => a.ts - b.ts);
    const countEl = document.getElementById('tonight-count');
    const listEl  = document.getElementById('tonight-list');
    document.getElementById('night-label').textContent = nightLabel(key);

    if (entries.length === 0) {
      countEl.textContent = 'No wakes logged tonight';
      listEl.innerHTML = '';
    } else {
      countEl.textContent = entries.length === 1 ? '1 wake tonight' : `${entries.length} wakes tonight`;
      listEl.innerHTML = entries.map((w, i) => {
        const gap = i > 0 ? fmtGap(w.ts - entries[i - 1].ts) : '';
        const noteHtml = w.note
          ? `<span class="entry-note" onclick="editNote('${key}',${w.ts})">${w.note}</span>`
          : `<span class="add-note-link" onclick="editNote('${key}',${w.ts})">+ add note</span>`;
        return `
          <div class="entry" id="entry-${w.ts}">
            <div>
              <div class="entry-time">${fmtTime(w.ts)}</div>
              ${gap ? `<div class="entry-since">${gap} since last</div>` : '<div class="entry-since">first wake</div>'}
              <div id="note-wrap-${w.ts}">${noteHtml}</div>
            </div>
            <button class="delete-btn" onclick="deleteEntry('${key}',${w.ts})" title="Delete">✕</button>
          </div>`;
      }).join('');
    }

    // Morning feeling buttons
    document.getElementById('feeling-grid').innerHTML = FEELINGS.map(f => `
      <button class="feeling-btn ${night.morning === f.id ? 'selected' : ''}" onclick="setMorning('${key}','${f.id}')">
        <span class="feeling-emoji">${f.emoji}</span>
        <span>${f.label}</span>
      </button>`).join('');

    // Thoughts textarea
    const ta = document.getElementById('thoughts-textarea');
    ta.value = night.thoughts || '';
    ta.oninput = () => saveThoughts(key, ta.value);
  }

  function editNote(key, ts) {
    const wrap = document.getElementById(`note-wrap-${ts}`);
    if (!wrap) return;
    const d = getData();
    const w = d[key] && d[key].wakes.find(w => w.ts === ts);
    const current = w ? w.note : '';
    wrap.innerHTML = `<input class="note-input" id="noteinput-${ts}" type="text" value="${current.replace(/"/g,'&quot;')}" placeholder="e.g. pain, thirsty…" maxlength="60">`;
    const inp = document.getElementById(`noteinput-${ts}`);
    inp.focus();
    inp.select();
    function commit() {
      saveNote(key, ts, inp.value.trim());
      renderTonight();
    }
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
  }

  function renderHistory() {
    const d = getData();
    const keys = Object.keys(d).sort((a, b) => b.localeCompare(a));
    const listEl  = document.getElementById('history-list');
    const emptyEl = document.getElementById('history-empty');

    if (keys.length === 0) {
      emptyEl.style.display = '';
      listEl.innerHTML = '';
      return;
    }
    emptyEl.style.display = 'none';

    listEl.innerHTML = keys.map(key => {
      const night = d[key];
      const entries = night.wakes.slice().sort((a, b) => a.ts - b.ts);
      const count = entries.length;
      const gaps = entries.slice(1).map((w, i) => w.ts - entries[i].ts);
      const avgGap = gaps.length ? Math.round(gaps.reduce((a, b) => a + b, 0) / gaps.length / 60000) : null;
      const first = entries[0], last = entries[entries.length - 1];

      const entriesHtml = entries.map((w, i) => {
        const gap = i > 0 ? fmtGap(w.ts - entries[i - 1].ts) : '—';
        return `
          <div class="history-entry">
            <span class="history-entry-time">${fmtTime(w.ts)}</span>
            ${w.note ? `<span class="history-entry-note">${w.note}</span>` : '<span></span>'}
            <span class="history-entry-gap">${gap}</span>
          </div>`;
      }).join('');

      const statsHtml = count > 1 ? `
        <div class="stats-strip">
          <div class="stat-chip"><div class="val">${fmtTime(first.ts)}</div><div class="lbl">First</div></div>
          <div class="stat-chip"><div class="val">${fmtTime(last.ts)}</div><div class="lbl">Last</div></div>
          ${avgGap !== null ? `<div class="stat-chip"><div class="val">${avgGap}m</div><div class="lbl">Avg gap</div></div>` : ''}
        </div>` : '';

      const morningHtml = (() => {
        const f = FEELINGS.find(f => f.id === night.morning);
        return f ? `<span class="morning-tag">${f.emoji} ${f.label}</span>` : '';
      })();

      return `
        <div class="night-card">
          <div class="night-card-header">
            <span class="night-card-date">${nightLabel(key)}</span>
            <span style="display:flex;align-items:center;gap:6px">
              ${morningHtml}
              <span class="night-card-count">${count} wake${count !== 1 ? 's' : ''}</span>
              <button class="clear-night-btn" onclick="clearNight('${key}')" title="Delete night">✕</button>
            </span>
          </div>
          <div class="night-card-entries">${entriesHtml}</div>
          ${statsHtml}
          ${night.thoughts ? `<div class="history-thoughts">${night.thoughts.replace(/</g,'&lt;')}</div>` : ''}
        </div>`;
    }).join('');
  }

  function renderStats() {
    const d = getData();
    const keys = Object.keys(d).sort((a, b) => a.localeCompare(b));
    const el = document.getElementById('stats-content');

    if (keys.length === 0) {
      el.innerHTML = '<p class="stats-empty">No data yet — log some wakes first.</p>';
      return;
    }

    // Summary
    const allNights = keys.map(k => d[k]);
    const wakeCounts = allNights.map(n => n.wakes.length);
    const totalNights = keys.length;
    const avgWakes = (wakeCounts.reduce((a, b) => a + b, 0) / wakeCounts.length).toFixed(1);
    const worstCount = Math.max(...wakeCounts);

    // Last 7 nights bar chart
    const last7 = keys.slice(-7);
    const maxBar = Math.max(...last7.map(k => d[k].wakes.length), 1);
    const barsHtml = last7.map(k => {
      const c = d[k].wakes.length;
      const pct = Math.max(Math.round((c / maxBar) * 100), 5);
      const day = new Date(k + 'T12:00:00').toLocaleDateString(undefined, { weekday: 'short' });
      return `
        <div class="bar-col">
          <div class="bar-val">${c}</div>
          <div class="bar" style="height:${pct}%"></div>
          <div class="bar-day">${day}</div>
        </div>`;
    }).join('');

    // Morning feeling breakdown
    const counts = {};
    FEELINGS.forEach(f => counts[f.id] = 0);
    allNights.forEach(n => { if (n.morning && counts[n.morning] !== undefined) counts[n.morning]++; });
    const totalFeelings = Object.values(counts).reduce((a, b) => a + b, 0);

    const feelingsHtml = totalFeelings === 0
      ? '<p style="color:var(--muted);font-size:0.82rem;padding:4px 0">No morning feelings logged yet.</p>'
      : FEELINGS.map(f => {
          const c = counts[f.id];
          const pct = Math.round((c / totalFeelings) * 100);
          return `
            <div class="feeling-stat-row">
              <span style="font-size:1.1rem">${f.emoji}</span>
              <span style="font-size:0.8rem;min-width:76px">${f.label}</span>
              <div class="feeling-bar-track"><div class="feeling-bar-fill" style="width:${pct}%"></div></div>
              <span class="feeling-stat-count">${c}</span>
            </div>`;
        }).join('');

    el.innerHTML = `
      <div class="stats-section-title">Overview</div>
      <div class="summary-grid">
        <div class="summary-chip"><div class="big-val">${totalNights}</div><div class="lbl">Nights</div></div>
        <div class="summary-chip"><div class="big-val">${avgWakes}</div><div class="lbl">Avg wakes</div></div>
        <div class="summary-chip"><div class="big-val">${worstCount}</div><div class="lbl">Most in a night</div></div>
      </div>

      <div class="stats-section-title">Last ${last7.length} nights</div>
      <div class="bar-chart-wrap">
        <div class="bar-chart">${barsHtml}</div>
      </div>

      <div class="stats-section-title">Morning feeling</div>
      <div class="feeling-stats-card">${feelingsHtml}</div>
    `;
  }

  function clearNight(key) {
    if (!confirm(`Delete all entries for ${nightLabel(key)}?`)) return;
    const d = getData();
    delete d[key];
    saveData(d);
    renderTonight();
    renderHistory();
    renderStats();
  }

  // Tab switching
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.view).classList.add('active');
      if (btn.dataset.view === 'history-view') renderHistory();
      if (btn.dataset.view === 'stats-view') renderStats();
    });
  });

  // Live clock
  function updateClock() {
    document.getElementById('live-clock').textContent = new Date().toLocaleTimeString(undefined, {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
  }
  updateClock();
  setInterval(updateClock, 1000);

  renderTonight();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/wake-sw.js').catch(() => {});
  }
</script>
</body>
</html>
